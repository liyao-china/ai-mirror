<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面试报告 - AI面镜</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
          colors: {
            primary: '#6366F1',
            brand: { from: '#6366F1', to: '#8B5CF6' },
          },
        },
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="supabase-config.js"></script>
  <script src="ai-client.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(99,102,241,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139,92,246,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* 品牌渐变按钮 */
    .btn-brand {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 14px rgba(99,102,241,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .btn-brand:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.35);
    }
    .btn-brand:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 卡片统一样式 */
    .card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 20px rgba(99,102,241,0.08);
    }

    /* 加载旋转动画 */
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    .loader-spinner {
      width: 48px; height: 48px;
      border: 4px solid #E0E7FF;
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin-slow 0.8s linear infinite;
    }

    /* 进度条动画 */
    .score-bar-fill {
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Toast动画 */
    @keyframes toast-in {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(120%); opacity: 0; }
    }
    .toast-enter { animation: toast-in 0.3s ease-out forwards; }
    .toast-exit { animation: toast-out 0.3s ease-in forwards; }

    /* 折叠面板过渡 */
    .collapse-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .collapse-body.open {
      max-height: 5000px;
    }

    /* 渐变文字 */
    .gradient-text {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="bg-[#F9FAFB] text-gray-900 min-h-screen font-sans">

  <!-- Toast 容器 -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

  <!-- 主容器 -->
  <div id="app" class="max-w-4xl mx-auto px-4 py-8">

    <!-- 错误视图（初始隐藏） -->
    <div id="error-view" class="hidden">
      <div class="card p-12 text-center">
        <div class="text-6xl mb-4">😕</div>
        <h2 class="text-2xl font-bold mb-2">报告加载失败</h2>
        <p id="error-msg" class="text-gray-500 mb-6">未找到面试记录，请重新开始面试。</p>
        <a href="setup.html" class="btn-brand inline-block text-white px-8 py-3 rounded-xl font-medium">开始新的面试</a>
      </div>
    </div>

    <!-- 加载视图（初始显示） -->
    <div id="loading-view">
      <div class="flex flex-col items-center justify-center py-32">
        <div class="loader-spinner mb-6"></div>
        <p id="loading-text" class="text-lg text-gray-600">AI 正在分析你的面试表现...</p>
      </div>
    </div>

    <!-- 报告主体（初始隐藏） -->
    <div id="report-view" class="hidden">

      <!-- 1. 报告头 -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold gradient-text">面试报告</h1>
          <p id="report-subtitle" class="text-gray-500 mt-1"></p>
        </div>
        <div class="flex gap-3 shrink-0">
          <a href="history.html" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition text-sm font-medium">&larr; 历史记录</a>
          <a href="setup.html" class="btn-brand px-5 py-2.5 rounded-xl text-white text-sm font-medium">&#x1f504; 再练一次</a>
        </div>
      </div>

      <!-- 2. 多轮横幅 -->
      <div id="series-banner" class="hidden mb-6"></div>

      <!-- 3. 综合得分卡 -->
      <div class="card p-6 md:p-8 mb-6">
        <div class="flex flex-col md:flex-row items-center gap-8">
          <!-- 左侧：总分 -->
          <div class="flex-1 text-center md:text-left">
            <p class="text-gray-500 text-sm mb-2">综合得分</p>
            <div class="flex items-baseline justify-center md:justify-start gap-1">
              <span id="total-score" class="text-6xl font-bold gradient-text">--</span>
              <span class="text-xl text-gray-400">/100</span>
            </div>
            <span id="score-level" class="inline-block mt-3 px-4 py-1 rounded-full text-sm font-medium bg-indigo-50 text-indigo-600"></span>
            <p id="overall-comment" class="text-gray-600 mt-4 leading-relaxed"></p>
          </div>
          <!-- 右侧：雷达图 -->
          <div class="w-72 h-72 shrink-0">
            <canvas id="radar-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- 4. 各维度得分 -->
      <div class="card p-6 md:p-8 mb-6">
        <h2 class="text-xl font-bold mb-6">各维度得分</h2>
        <div id="dimension-bars" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-5"></div>
      </div>

      <!-- 5. 隐性加减分 -->
      <div id="bonus-penalty-section" class="hidden mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="card p-6 border-l-4 border-green-500">
            <h3 class="font-bold text-green-700 mb-3">&#9989; 隐性加分</h3>
            <ul id="bonus-list" class="space-y-2 text-gray-600 text-sm"></ul>
          </div>
          <div class="card p-6 border-l-4 border-amber-500">
            <h3 class="font-bold text-amber-700 mb-3">&#9888;&#65039; 隐性减分</h3>
            <ul id="penalty-list" class="space-y-2 text-gray-600 text-sm"></ul>
          </div>
        </div>
      </div>

      <!-- 6. 改进建议 -->
      <div class="card bg-indigo-50 p-6 md:p-8 mb-6">
        <h2 class="text-xl font-bold mb-5">改进建议</h2>
        <div id="suggestions-list" class="space-y-3"></div>
      </div>

      <!-- 7. 历史弱项追踪 -->
      <div id="weakness-tracking-section" class="hidden card p-6 md:p-8 mb-6">
        <h2 class="text-xl font-bold mb-5">历史弱项追踪</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
          <div>
            <h4 class="text-sm font-medium text-gray-500 mb-2">弱项标签</h4>
            <div id="weakness-tags" class="flex flex-wrap gap-2"></div>
          </div>
          <div>
            <h4 class="text-sm font-medium text-gray-500 mb-2">改进目标</h4>
            <ul id="improvement-goals" class="space-y-2 text-sm text-gray-600"></ul>
          </div>
          <div>
            <h4 class="text-sm font-medium text-gray-500 mb-2">追问方向</h4>
            <ul id="next-probes" class="space-y-2 text-sm text-gray-600"></ul>
          </div>
        </div>
        <div id="historical-progress" class="bg-gray-50 rounded-xl p-4 text-sm text-gray-600 leading-relaxed"></div>
      </div>

      <!-- 8. 逐题点评 -->
      <div class="card p-6 md:p-8 mb-6">
        <h2 class="text-xl font-bold mb-5">逐题点评</h2>
        <div id="question-list" class="space-y-4"></div>
      </div>

      <!-- 9. 底部按钮排 -->
      <div class="flex flex-wrap justify-center gap-4 mb-12">
        <a href="setup.html" class="btn-brand px-6 py-3 rounded-xl text-white font-medium">&#x1f504; 再练一次</a>
        <a href="training.html" class="px-6 py-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition font-medium">&#128101; HR面/薪资谈判训练</a>
        <a href="history.html" class="px-6 py-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition font-medium">查看历史成长</a>
      </div>

    </div><!-- /report-view -->
  </div><!-- /app -->

  <script>
    /* ============================================================
     *  AI面镜 - 面试报告页 (report.html)
     *  所有逻辑集中在此脚本块中
     * ============================================================ */

    // ---------- 映射表 ----------
    const jobNames = { 'pm': '产品经理', 'aimanager': 'AI产品经理', 'rd': '研发工程师', 'aiml': 'AI算法工程师', 'data': '数据分析师', 'fe': '前端工程师', 'be': '后端工程师', 'android': 'Android工程师', 'ios': 'iOS工程师', 'ops': '运维工程师', 'qa': '测试工程师', 'pmnew': '产品经理(校招)', 'aimlnew': 'AI算法(校招)', 'fe_new': '前端工程师(校招)' };
    const levelNames = { 'junior': '初级', 'mid': '中级', 'senior': '高级', 'expert': '专家' };
    const roundNames = { 'hr': 'HR面', 'technical': '技术面', 'behavior': '行为面', 'case': '案例面', 'pressure': '压力面', 'final': '终面' };
    const typeNames = { 'general': '通用能力', 'technical': '专业技术', 'behavioral': '行为面试', 'case': '案例分析', 'system': '系统设计' };

    // 维度配置：key → {中文名, 权重}
    const DIMENSIONS = {
      jobMatch:    { name: '岗位匹配度', weight: 0.30 },
      logic:       { name: '逻辑清晰度', weight: 0.25 },
      fluency:     { name: '语言流畅度', weight: 0.15 },
      depth:       { name: '专业深度',   weight: 0.15 },
      confidence:  { name: '自信心',     weight: 0.10 },
      value:       { name: '价值表达',   weight: 0.05 }
    };

    // 全局状态
    let radarChartInstance = null; // 雷达图实例，渲染前必须 destroy
    let isSampleMode = false;     // 示例模式标记
    let isHistoryMode = false;    // 历史回看标记
    let currentReport = null;     // 当前报告数据
    let currentQA = [];           // 当前问答记录
    let currentMeta = {};         // 当前面试元信息
    let compareBtnsGenerated = {};// 好答案示范按钮防重复生成

    // ---------- 示例数据 ----------
    const SAMPLE_QA = [
      { question: "请介绍一个你主导的AI产品项目，以及你解决的核心问题。", answer: "我主导了客服RAG助手，从用户访谈、指标设计到灰度上线，重点解决检索准确率和答案可信度问题。" },
      { question: "你如何验证产品效果并推动持续优化？", answer: "我同时跟踪离线召回指标与线上采纳率、处理时长，通过失败案例回流持续完善评测集。" }
    ];
    const SAMPLE_REPORT = {
      scores: { jobMatch: 86, logic: 82, fluency: 80, depth: 78, confidence: 81, value: 84 },
      bonus: ["多次用具体指标和数据支撑结论", "坦诚说明项目不足并给出了改进计划"],
      penalty: ["个别成果表述较含糊，未说清个人贡献占比"],
      overallComment: "具备较完整的AI产品落地思路，下一步需要补充更具体的技术权衡与协作案例。",
      suggestions: ["补充项目规模、个人职责和关键决策依据。", "用更具体的失败案例说明复盘与迭代过程。", "加强对成本、延迟和准确率之间权衡的表达。"],
      questions: [
        { score: 84, good: ["项目目标和结果表达清楚"], bad: ["缺少项目规模和个人贡献占比"] },
        { score: 81, good: ["能够结合离线与线上指标"], bad: ["可进一步说明指标异常时的决策过程"] }
      ],
      weakness_tags: ["成果量化不足", "个人贡献模糊"],
      improvement_goals: ["下次回答时明确标注项目规模", "用STAR格式描述个人具体动作和决策"],
      next_probe_suggestions: ["追问RAG检索准确率具体数值和优化手段", "追问失败案例回流的具体流程"],
      historical_progress: { summary: "这是第一份可追踪的基线报告，后续会持续对比", improved: [], repeated_weaknesses: [] }
    };

    // ==================== 页面初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[报告页] 页面加载，开始分流...');
      routePage();
    });

    /**
     * 入口分流逻辑（按优先级）
     */
    function routePage() {
      const params = new URLSearchParams(window.location.search);

      // 1. 示例模式
      if (params.get('sample') === '1') {
        console.log('[报告页] 进入示例模式，零网络请求');
        isSampleMode = true;
        currentMeta = { job: 'aimanager', level: 'mid', round: 'technical', types: ['technical', 'general'] };
        currentQA = SAMPLE_QA;
        currentReport = SAMPLE_REPORT;
        renderReport('AI产品经理 · 中级 · 示例报告');
        return;
      }

      // 2. 历史回看模式
      const historyData = localStorage.getItem('viewHistoryReport');
      if (historyData) {
        console.log('[报告页] 进入历史回看模式');
        localStorage.removeItem('viewHistoryReport'); // 消费后立即删除
        isHistoryMode = true;
        try {
          const parsed = JSON.parse(historyData);
          currentReport = parsed.report;
          currentQA = parsed.qaRecords || [];
          currentMeta = parsed.meta || {};
          const sub = buildSubtitle(currentMeta);
          renderReport(sub);
          return;
        } catch (e) {
          console.error('[报告页] 历史数据解析失败', e);
          showError('历史报告数据格式异常，请重新查看。');
          return;
        }
      }

      // 3. session 参数过期检查
      const sessionParam = params.get('session');
      const currentSessionId = localStorage.getItem('currentSessionId');
      if (sessionParam && currentSessionId && sessionParam !== currentSessionId) {
        console.log('[报告页] 报告链接已过期');
        showError('报告链接已过期，当前会话不匹配。请重新开始面试。');
        return;
      }

      // 4. 正常模式
      console.log('[报告页] 进入正常模式');
      const qaRecords = localStorage.getItem('qaRecords');
      const interviewMeta = localStorage.getItem('interviewMeta');

      if (!qaRecords || !interviewMeta) {
        console.warn('[报告页] 未找到面试记录');
        showError('未找到面试记录，请先完成一场模拟面试。');
        return;
      }

      try {
        currentQA = JSON.parse(qaRecords);
        currentMeta = JSON.parse(interviewMeta);
      } catch (e) {
        console.error('[报告页] 面试数据解析失败', e);
        showError('面试数据格式异常，请重新开始面试。');
        return;
      }

      // 检查是否有缓存的报告（避免重复扣额度）
      const cachedReport = localStorage.getItem('currentInterviewReport');
      if (cachedReport) {
        console.log('[报告页] 使用缓存报告，不重新调用AI');
        try {
          currentReport = JSON.parse(cachedReport);
          const sub = buildSubtitle(currentMeta);
          renderReport(sub);
          return;
        } catch (e) {
          console.warn('[报告页] 缓存报告解析失败，重新生成');
          localStorage.removeItem('currentInterviewReport');
        }
      }

      // 调用AI生成报告
      generateReport();
    }

    // ==================== 报告生成 ====================
    /**
     * 调用AI生成面试报告
     */
    async function generateReport() {
      showLoading('AI 正在分析你的面试表现...');

      const jobName = jobNames[currentMeta.job] || currentMeta.job || '未知岗位';
      const levelName = levelNames[currentMeta.level] || currentMeta.level || '未知级别';
      const roundName = roundNames[currentMeta.round] || currentMeta.round || '未知轮次';
      const typeList = (currentMeta.types || []).map(t => typeNames[t] || t).join('、');
      const N = currentQA.length;

      // 构建问答文本
      const qaText = currentQA.map((qa, i) =>
        `【第${i + 1}题】${qa.question}\n【回答】${qa.answer || '（未作答）'}`
      ).join('\n\n');

      // 判断是否需要追加AI产品经理专项评分
      const aiProductExtra = jobName.includes('AI产品')
        ? '\n【AI产品经理专项评分参考】对AI能力边界真实理解、AI产品化能力、数据思维、用业务指标评估效果、人机协作设计。只会背AI概念的这两个维度不超过65分。'
        : '';

      const userPrompt = `你是一位严格、专业的面试评分专家。请根据以下面试问答记录，对候选人（应聘${jobName}，${levelName}级别，本场为${roundName}）进行专业评分。\n【面试问答记录】${qaText}\n【评分维度与权重】1.岗位匹配度(30%) 2.逻辑清晰度(25%) 3.语言流畅度(15%) 4.专业深度(15%) 5.自信心(10%) 6.价值表达(5%)\n【评分标尺】请按真实校招/社招的通过标准打分，不要客气：60分=勉强及格存在明显短板，75分=达到该职级平均水平，85分以上=明显优于多数同职级候选人，95分以上原则上不给。回答空泛、缺乏具体案例和数据的，相应维度不应超过65分。${aiProductExtra}\n【面试官隐性加减分】只列有真实依据的：隐性加分（用数据/事实说话、坦诚不足、自信不傲慢、有结构、做过功课）；隐性减分（贬低前公司、背模板套话、成果注水、傲慢/自卑、答非所问、前后矛盾）。没证据就空数组。\n【要求】每个维度0-100分；3条改进建议；questions数组严格按题目顺序共${N}项不可合并省略，每项得分+1-2亮点+1-2改进点。\n【历史弱项闭环】weakness_tags(3-8个标签)、improvement_goals(3-5条目标)、next_probe_suggestions(3-5条追问方向)、historical_progress(无历史时说明是基线报告)\n【必须严格按以下JSON格式返回，不要任何其他文字，不要markdown代码块】\n{"scores":{"jobMatch":数字,"logic":数字,"fluency":数字,"depth":数字,"confidence":数字,"value":数字},"overallComment":"50字内","suggestions":["建议1","建议2","建议3"],"questions":[{"score":数字,"good":["亮点"],"bad":["改进"]}],"bonus":["加分"],"penalty":["减分"],"weakness_tags":["标签"],"improvement_goals":["目标"],"next_probe_suggestions":["方向"],"historical_progress":{"summary":"80字内","improved":["进步"],"repeated_weaknesses":["仍问题"]}}`;

      // 最多重试3次
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          console.log(`[报告页] 第${attempt}次调用AI生成报告...`);
          showLoading(`AI 正在分析你的面试表现...（第${attempt}次）`);
          const raw = await window.AIProxy.chat([
            { role: 'system', content: '你是专业的面试评分专家，只返回JSON格式的评分结果。' },
            { role: 'user', content: userPrompt }
          ]);
          // 不传 mode，使用强模型

          currentReport = parseReport(raw, N);
          console.log('[报告页] 报告解析成功');

          // 缓存报告
          localStorage.setItem('currentInterviewReport', JSON.stringify(currentReport));

          const sub = buildSubtitle(currentMeta);
          renderReport(sub);
          return;
        } catch (err) {
          console.error(`[报告页] 第${attempt}次生成失败:`, err);
          if (attempt === 3) {
            showError('AI 报告生成失败：' + (err.message || '未知错误'), true);
            return;
          }
        }
      }
    }

    // ==================== 报告解析 ====================
    /**
     * 解析AI返回的原始文本为结构化报告对象
     * @param {string} raw - AI原始返回
     * @param {number} expectedQuestions - 期望题目数
     * @returns {object} 结构化报告
     */
    function parseReport(raw, expectedQuestions) {
      let text = raw;

      // 1. 剥 ```json 围栏
      const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
      if (fenceMatch) {
        text = fenceMatch[1].trim();
      }

      // 2. 取第一个 { 到最后一个 } 之间
      const firstBrace = text.indexOf('{');
      const lastBrace = text.lastIndexOf('}');
      if (firstBrace === -1 || lastBrace === -1 || lastBrace <= firstBrace) {
        throw new Error('未找到有效的JSON数据');
      }
      text = text.substring(firstBrace, lastBrace + 1);

      // 3. JSON.parse
      let report;
      try {
        report = JSON.parse(text);
      } catch (e) {
        throw new Error('JSON解析失败：' + e.message);
      }

      // 4. 校验6个维度分数
      if (!report.scores || typeof report.scores !== 'object') {
        throw new Error('报告缺少 scores 字段');
      }
      for (const key of Object.keys(DIMENSIONS)) {
        if (typeof report.scores[key] !== 'number' || isNaN(report.scores[key])) {
          report.scores[key] = 0;
        }
        // clamp到0-100
        report.scores[key] = Math.max(0, Math.min(100, Math.round(report.scores[key])));
      }

      // 5. suggestions截前3
      if (Array.isArray(report.suggestions)) {
        report.suggestions = report.suggestions.slice(0, 3);
      } else {
        report.suggestions = ['暂无具体建议'];
      }

      // 6. questions对齐
      if (!Array.isArray(report.questions)) report.questions = [];
      while (report.questions.length < expectedQuestions) {
        report.questions.push({ score: null, good: [], bad: [], missing: true });
      }
      if (report.questions.length > expectedQuestions) {
        report.questions = report.questions.slice(0, expectedQuestions);
      }
      // 补全缺失字段
      report.questions.forEach(q => {
        if (q.missing === undefined && q.score === null) q.missing = true;
      });

      // 7. bonus/penalty截前6
      if (Array.isArray(report.bonus)) report.bonus = report.bonus.slice(0, 6);
      if (Array.isArray(report.penalty)) report.penalty = report.penalty.slice(0, 6);

      return report;
    }

    // ==================== 报告渲染 ====================
    /**
     * 渲染完整报告
     * @param {string} subtitle - 报告副标题文本
     */
    function renderReport(subtitle) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('error-view').classList.add('hidden');
      document.getElementById('report-view').classList.remove('hidden');

      // 1. 报告头
      document.getElementById('report-subtitle').textContent = subtitle;

      // 2. 多轮横幅
      renderSeriesBanner();

      // 3. 综合得分卡
      renderScoreCard();

      // 4. 各维度得分
      renderDimensionBars();

      // 5. 隐性加减分
      renderBonusPenalty();

      // 6. 改进建议
      renderSuggestions();

      // 7. 历史弱项追踪
      renderWeaknessTracking();

      // 8. 逐题点评
      renderQuestionList();

      // 9. 保存到云端
      saveToCloud(currentReport);

      console.log('[报告页] 报告渲染完成');
    }

    /**
     * 构建副标题
     */
    function buildSubtitle(meta) {
      const jobName = jobNames[meta.job] || meta.job || '未知岗位';
      const levelName = levelNames[meta.level] || meta.level || '未知级别';
      const roundName = roundNames[meta.round] || meta.round || '未知轮次';
      const typeList = (meta.types || []).map(t => typeNames[t] || t).join('、');
      return `${jobName} · ${levelName} · ${roundName} · ${typeList}`;
    }

    // ---------- 3. 综合得分卡 ----------
    function renderScoreCard() {
      const scores = currentReport.scores;
      // 加权总分
      let total = 0;
      for (const [key, dim] of Object.entries(DIMENSIONS)) {
        total += (scores[key] || 0) * dim.weight;
      }
      total = Math.round(total);

      document.getElementById('total-score').textContent = total;

      // 等级标签
      let levelText, levelClass;
      if (total >= 92) { levelText = '专家'; levelClass = 'bg-indigo-100 text-indigo-700'; }
      else if (total >= 80) { levelText = '高级'; levelClass = 'bg-green-100 text-green-700'; }
      else if (total >= 60) { levelText = '中级'; levelClass = 'bg-yellow-100 text-yellow-700'; }
      else if (total >= 40) { levelText = '初级'; levelClass = 'bg-orange-100 text-orange-700'; }
      else { levelText = '待加强'; levelClass = 'bg-red-100 text-red-700'; }
      const levelEl = document.getElementById('score-level');
      levelEl.textContent = levelText;
      levelEl.className = `inline-block mt-3 px-4 py-1 rounded-full text-sm font-medium ${levelClass}`;

      // 总评
      document.getElementById('overall-comment').textContent = currentReport.overallComment || '';

      // 雷达图
      renderRadarChart(scores);
    }

    function renderRadarChart(scores) {
      const ctx = document.getElementById('radar-chart');
      if (!ctx) return;

      // 销毁旧实例
      if (radarChartInstance) {
        radarChartInstance.destroy();
        radarChartInstance = null;
      }

      const labels = Object.values(DIMENSIONS).map(d => d.name);
      const data = Object.keys(DIMENSIONS).map(k => scores[k] || 0);

      radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: labels,
          datasets: [{
            label: '得分',
            data: data,
            backgroundColor: 'rgba(99, 102, 241, 0.15)',
            borderColor: 'rgba(99, 102, 241, 0.7)',
            borderWidth: 2,
            pointBackgroundColor: '#6366F1',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          scales: {
            r: {
              beginAtZero: true,
              min: 0,
              max: 100,
              ticks: {
                stepSize: 20,
                font: { size: 11 },
                color: '#9CA3AF'
              },
              pointLabels: {
                font: { size: 12, family: 'Inter, PingFang SC, Microsoft YaHei' },
                color: '#374151'
              },
              grid: {
                color: 'rgba(99,102,241,0.1)'
              },
              angleLines: {
                color: 'rgba(99,102,241,0.1)'
              }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    // ---------- 4. 各维度得分 ----------
    function renderDimensionBars() {
      const container = document.getElementById('dimension-bars');
      container.innerHTML = '';

      const scores = currentReport.scores;
      for (const [key, dim] of Object.entries(DIMENSIONS)) {
        const val = scores[key] || 0;
        const pct = Math.max(0, Math.min(100, val));
        // 颜色：>=80绿 / >=60紫 / <60橙
        let barColor;
        if (val >= 80) barColor = '#10B981';
        else if (val >= 60) barColor = '#6366F1';
        else barColor = '#F59E0B';

        const weightPct = Math.round(dim.weight * 100);

        const item = document.createElement('div');
        item.innerHTML = `
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-medium text-gray-700">${dim.name}
              <span class="text-xs text-gray-400 ml-1">${weightPct}%</span>
            </span>
            <span class="text-sm font-bold" style="color:${barColor}">${val}</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
            <div class="score-bar-fill h-full rounded-full" style="width:0%;background:${barColor}"></div>
          </div>
        `;
        container.appendChild(item);

        // 延迟动画
        requestAnimationFrame(() => {
          setTimeout(() => {
            item.querySelector('.score-bar-fill').style.width = pct + '%';
          }, 100);
        });
      }
    }

    // ---------- 5. 隐性加减分 ----------
    function renderBonusPenalty() {
      const section = document.getElementById('bonus-penalty-section');
      const bonus = currentReport.bonus || [];
      const penalty = currentReport.penalty || [];

      // 都空则隐藏
      if (bonus.length === 0 && penalty.length === 0) {
        section.classList.add('hidden');
        return;
      }
      section.classList.remove('hidden');

      // 加分列表
      const bonusListEl = document.getElementById('bonus-list');
      bonusListEl.innerHTML = bonus.length > 0
        ? bonus.map(b => `<li class="flex items-start gap-2"><span class="text-green-500 mt-0.5">&#10003;</span><span>${escHtml(b)}</span></li>`).join('')
        : '<li class="text-gray-400">未发现明显信号</li>';

      // 减分列表
      const penaltyListEl = document.getElementById('penalty-list');
      penaltyListEl.innerHTML = penalty.length > 0
        ? penalty.map(p => `<li class="flex items-start gap-2"><span class="text-amber-500 mt-0.5">&#9888;</span><span>${escHtml(p)}</span></li>`).join('')
        : '<li class="text-gray-400">未发现明显信号</li>';
    }

    // ---------- 6. 改进建议 ----------
    function renderSuggestions() {
      const container = document.getElementById('suggestions-list');
      const suggestions = currentReport.suggestions || [];
      container.innerHTML = suggestions.map((s, i) => `
        <div class="bg-white rounded-xl p-4 flex items-start gap-4 shadow-sm">
          <span class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm">${i + 1}</span>
          <div class="flex-1">
            <p class="text-gray-700">${escHtml(s)}</p>
          </div>
          <a href="setup.html" class="flex-shrink-0 text-indigo-500 hover:text-indigo-700 text-sm font-medium transition">专项练习 &rarr;</a>
        </div>
      `).join('');
    }

    // ---------- 7. 历史弱项追踪 ----------
    function renderWeaknessTracking() {
      const section = document.getElementById('weakness-tracking-section');
      const tags = currentReport.weakness_tags || [];
      const goals = currentReport.improvement_goals || [];
      const probes = currentReport.next_probe_suggestions || [];
      const progress = currentReport.historical_progress || {};

      // 四字段全空则隐藏
      if (tags.length === 0 && goals.length === 0 && probes.length === 0 &&
          (!progress.summary || progress.summary.length === 0)) {
        section.classList.add('hidden');
        return;
      }
      section.classList.remove('hidden');

      // 弱项标签云
      document.getElementById('weakness-tags').innerHTML = tags.length > 0
        ? tags.map(t => `<span class="px-3 py-1 rounded-full bg-red-50 text-red-600 text-xs font-medium">${escHtml(t)}</span>`).join('')
        : '<span class="text-gray-400 text-sm">暂无标签</span>';

      // 改进目标
      document.getElementById('improvement-goals').innerHTML = goals.length > 0
        ? goals.map(g => `<li class="flex items-start gap-2"><span class="text-indigo-400 mt-0.5">&#9679;</span><span>${escHtml(g)}</span></li>`).join('')
        : '<li class="text-gray-400">暂无</li>';

      // 追问方向
      document.getElementById('next-probes').innerHTML = probes.length > 0
        ? probes.map(p => `<li class="flex items-start gap-2"><span class="text-purple-400 mt-0.5">&#9679;</span><span>${escHtml(p)}</span></li>`).join('')
        : '<li class="text-gray-400">暂无</li>';

      // 历史进步段落
      const progressEl = document.getElementById('historical-progress');
      if (progress.summary) {
        let text = progress.summary;
        if (progress.improved && progress.improved.length > 0) {
          text += ' 进步点：' + progress.improved.join('、');
        }
        if (progress.repeated_weaknesses && progress.repeated_weaknesses.length > 0) {
          text += ' 仍需改进：' + progress.repeated_weaknesses.join('、');
        }
        progressEl.textContent = text;
      } else {
        progressEl.textContent = '这是第一份可追踪的基线报告，后续会持续对比。';
      }
    }

    // ---------- 8. 逐题点评 ----------
    function renderQuestionList() {
      const container = document.getElementById('question-list');
      container.innerHTML = '';
      compareBtnsGenerated = {};

      currentQA.forEach((qa, idx) => {
        const qReport = (currentReport.questions && currentReport.questions[idx]) || { score: null, good: [], bad: [], missing: true };
        const isFirst = idx === 0;
        const scoreVal = qReport.score;
        const isMissing = qReport.missing || scoreVal === null;

        // 得分颜色
        let scoreColor = 'text-gray-400';
        if (!isMissing) {
          if (scoreVal >= 80) scoreColor = 'text-green-600';
          else if (scoreVal >= 60) scoreColor = 'text-indigo-600';
          else scoreColor = 'text-amber-600';
        }

        // 截取题目（60字）
        const qTitle = truncate(qa.question || '未知题目', 60);

        const card = document.createElement('div');
        card.className = 'card border border-gray-100 overflow-hidden';
        card.innerHTML = `
          <div class="collapse-header flex items-center justify-between p-5 cursor-pointer hover:bg-gray-50 transition select-none" data-idx="${idx}">
            <div class="flex items-center gap-3 min-w-0">
              <span class="flex-shrink-0 w-7 h-7 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold">Q${idx + 1}</span>
              <span class="text-gray-800 font-medium truncate">${escHtml(qTitle)}</span>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
              <span class="text-lg font-bold ${scoreColor}">${isMissing ? '—' : scoreVal}</span>
              <span class="collapse-arrow text-gray-400 transition-transform duration-200 ${isFirst ? 'rotate-180' : ''}">&#9662;</span>
            </div>
          </div>
          <div class="collapse-body ${isFirst ? 'open' : ''}" data-body="${idx}">
            <div class="px-5 pb-5 border-t border-gray-100 pt-4">
              ${renderQuestionDetail(qa, qReport, idx)}
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // 绑定折叠事件
      container.querySelectorAll('.collapse-header').forEach(header => {
        header.addEventListener('click', () => {
          const idx = header.dataset.idx;
          const body = container.querySelector(`[data-body="${idx}"]`);
          const arrow = header.querySelector('.collapse-arrow');
          body.classList.toggle('open');
          arrow.classList.toggle('rotate-180');
        });
      });
    }

    /**
     * 渲染单题详情（亮点、改进、原文、好答案按钮）
     */
    function renderQuestionDetail(qa, qReport, idx) {
      const isMissing = qReport.missing || qReport.score === null;
      let html = '';

      // 亮点
      const goods = qReport.good || [];
      if (goods.length > 0) {
        html += `<div class="mb-3">
          <p class="text-sm font-medium text-green-700 mb-1">&#9989; 亮点</p>
          <ul class="space-y-1 text-sm text-gray-600">${goods.map(g => `<li>&bull; ${escHtml(g)}</li>`).join('')}</ul>
        </div>`;
      }

      // 改进
      const bads = qReport.bad || [];
      if (bads.length > 0) {
        html += `<div class="mb-3">
          <p class="text-sm font-medium text-amber-700 mb-1">&#9888;&#65039; 改进</p>
          <ul class="space-y-1 text-sm text-gray-600">${bads.map(b => `<li>&bull; ${escHtml(b)}</li>`).join('')}</ul>
        </div>`;
      }

      if (isMissing) {
        html += `<p class="text-sm text-gray-400 italic mb-3">未单独点评</p>`;
      }

      // 你的回答
      html += `<div class="mb-4">
        <p class="text-sm font-medium text-gray-500 mb-2">&#128221; 你的回答</p>
        <div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700 leading-relaxed">${escHtml(qa.answer || '（未作答）')}</div>
      </div>`;

      // 好答案vs差答案按钮
      html += `<button class="compare-btn text-sm text-indigo-500 hover:text-indigo-700 font-medium transition" data-qidx="${idx}">&#128142; 好答案 vs 差答案示范</button>`;
      html += `<div class="compare-result mt-3" id="compare-result-${idx}"></div>`;

      return html;
    }

    /**
     * 生成好答案vs差答案示范（按需，点击才调用AI）
     */
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.compare-btn');
      if (!btn) return;

      const qidx = parseInt(btn.dataset.qidx);
      if (compareBtnsGenerated[qidx]) return; // 防重复
      compareBtnsGenerated[qidx] = true;

      const resultDiv = document.getElementById(`compare-result-${qidx}`);
      const qa = currentQA[qidx];
      const jobName = jobNames[currentMeta.job] || currentMeta.job || '未知岗位';
      const levelName = levelNames[currentMeta.level] || currentMeta.level || '未知级别';

      btn.textContent = '正在生成示范...';
      btn.disabled = true;

      try {
        const raw = await window.AIProxy.chat([
          { role: 'system', content: '你是专业面试教练，只返回JSON。' },
          { role: 'user', content: `针对这道【${jobName}(${levelName})】题生成好答案vs差答案对比。题目:${qa.question}。候选人回答:${qa.answer}。差答案空泛6-10句；好答案贴合岗位8-14句口语化。返回JSON:{"type":"题型","bad":"...","badWhy":[...],"good":"...","goodWhy":[...],"followups":[...],"template":"..."}` }
        ]);

        const result = JSON.parse(raw.replace(/```(?:json)?\s*([\s\S]*?)\s*```/, '$1').trim());

        resultDiv.innerHTML = `
          <div class="space-y-4 mt-2">
            <div class="bg-red-50 rounded-xl p-4 border border-red-100">
              <p class="text-sm font-bold text-red-700 mb-2">&#10060; 差答案示范 (${escHtml(result.type || '通用')})</p>
              <p class="text-sm text-gray-700 leading-relaxed">${escHtml(result.bad || '')}</p>
              <ul class="mt-2 text-xs text-red-500 space-y-1">${(result.badWhy || []).map(w => `<li>&bull; ${escHtml(w)}</li>`).join('')}</ul>
            </div>
            <div class="bg-green-50 rounded-xl p-4 border border-green-100">
              <p class="text-sm font-bold text-green-700 mb-2">&#9989; 好答案示范</p>
              <p class="text-sm text-gray-700 leading-relaxed">${escHtml(result.good || '')}</p>
              <ul class="mt-2 text-xs text-green-600 space-y-1">${(result.goodWhy || []).map(w => `<li>&bull; ${escHtml(w)}</li>`).join('')}</ul>
            </div>
            ${(result.followups && result.followups.length > 0) ? `
              <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100">
                <p class="text-sm font-bold text-indigo-700 mb-2">&#128172; 可能的追问</p>
                <ul class="text-xs text-indigo-600 space-y-1">${result.followups.map(f => `<li>&bull; ${escHtml(f)}</li>`).join('')}</ul>
              </div>` : ''}
            ${result.template ? `
              <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                <p class="text-sm font-bold text-gray-700 mb-2">&#128203; 回答模板</p>
                <p class="text-xs text-gray-600 leading-relaxed">${escHtml(result.template)}</p>
              </div>` : ''}
          </div>
        `;
      } catch (err) {
        console.error('[报告页] 好答案生成失败:', err);
        compareBtnsGenerated[qidx] = false;
        btn.textContent = '&#128142; 好答案 vs 差答案示范';
        btn.disabled = false;
        resultDiv.innerHTML = `<p class="text-sm text-red-500">生成失败：${escHtml(err.message || '未知错误')}
          <a href="javascript:void(0)" class="text-indigo-500 underline ml-2 retry-compare" data-qidx="${qidx}">点击重试</a></p>`;
      }
    });

    // 重试好答案生成
    document.addEventListener('click', (e) => {
      const retryLink = e.target.closest('.retry-compare');
      if (!retryLink) return;
      const qidx = parseInt(retryLink.dataset.qidx);
      compareBtnsGenerated[qidx] = false;
      // 找到对应的按钮重新触发
      const btn = document.querySelector(`.compare-btn[data-qidx="${qidx}"]`);
      if (btn) btn.click();
    });

    // ---------- 2. 多轮横幅 ----------
    function renderSeriesBanner() {
      const container = document.getElementById('series-banner');
      // 历史模式或示例模式不显示横幅
      if (isHistoryMode || isSampleMode) {
        container.classList.add('hidden');
        return;
      }

      let series = null;
      try {
        const raw = localStorage.getItem('interviewSeries');
        if (raw) series = JSON.parse(raw);
      } catch (e) {
        // 解析失败忽略
      }

      if (!series || !series.rounds || !Array.isArray(series.rounds)) {
        container.classList.add('hidden');
        return;
      }

      const idx = series.index || 0;
      // 若没有后续轮次则隐藏
      if (idx >= series.rounds.length - 1) {
        container.classList.add('hidden');
        return;
      }

      const currentRoundName = roundNames[series.rounds[idx]] || series.rounds[idx] || '本轮';
      const remaining = series.rounds.length - idx - 1;
      const nextRoundKey = series.rounds[idx + 1];
      const nextRoundName = roundNames[nextRoundKey] || nextRoundKey || '下一轮';

      container.classList.remove('hidden');
      container.innerHTML = `
        <div class="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-6 border border-indigo-100">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div>
              <p class="text-green-700 font-medium mb-1">&#9989; ${escHtml(currentRoundName)} 已完成 &middot; 还有 ${remaining} 轮</p>
              <p class="text-sm text-gray-500">真实流程中通常这一轮通过后才进入下一轮。继续进入【${escHtml(nextRoundName)}】？面试官会延续你本轮暴露的强项与待改进点继续深入。</p>
            </div>
            <div class="flex gap-3 shrink-0">
              <button id="btn-next-round" class="btn-brand px-5 py-2.5 rounded-xl text-white text-sm font-medium">进入下一轮：${escHtml(nextRoundName)} &rarr;</button>
              <button id="btn-stop-series" class="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-50 transition text-sm font-medium">就到这里</button>
            </div>
          </div>
        </div>
      `;

      // 下一轮按钮
      document.getElementById('btn-next-round').addEventListener('click', () => {
        series.index = idx + 1;
        localStorage.setItem('interviewSeries', JSON.stringify(series));
        localStorage.setItem('seriesAdvance', '1');
        window.location.href = 'interview.html';
      });

      // 就到这里按钮
      document.getElementById('btn-stop-series').addEventListener('click', () => {
        localStorage.removeItem('interviewSeries');
        container.classList.add('hidden');
      });
    }

    // ==================== 云端保存 ====================
    async function saveToCloud(report) {
      // 示例/历史回看不保存
      if (isSampleMode || isHistoryMode) return;

      // 计算加权总分
      let totalScore = 0;
      for (const [key, dim] of Object.entries(DIMENSIONS)) {
        totalScore += (report.scores[key] || 0) * dim.weight;
      }
      totalScore = Math.round(totalScore);

      const jobName = jobNames[currentMeta.job] || currentMeta.job || '未知岗位';
      const levelName = levelNames[currentMeta.level] || currentMeta.level || '未知级别';
      const typeList = (currentMeta.types || []).map(t => typeNames[t] || t).join('、');

      // 尝试 Supabase 保存（需登录）
      try {
        if (window.supabase && typeof window.supabase === 'object') {
          // 动态加载 supabase JS SDK（如果尚未加载）
          if (!window.supabase.auth) {
            await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
            window.supabase = window.supabase.createClient
              ? window.supabase
              : supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
          }

          const { data: { user } } = await window.supabase.auth.getUser();
          if (user) {
            showToast('保存中...', 'info');
            const { error } = await window.supabase.from('interview_records').insert({
              user_id: user.id,
              job_name: jobName,
              level_name: levelName,
              type_list: typeList,
              total_score: totalScore,
              scores: report.scores,
              qa_records: currentQA,
              report: report
            });
            if (error) throw error;
            showToast('已保存到云端', 'success');
            return;
          }
        }
      } catch (err) {
        console.warn('[报告页] 云端保存失败:', err);
        showToast('云端保存失败，已保存到本地', 'warning');
      }

      // 未登录或云端失败：写入 localStorage
      try {
        const history = JSON.parse(localStorage.getItem('interviewHistory') || '[]');
        history.unshift({
          date: new Date().toISOString(),
          jobName, levelName, typeList,
          totalScore,
          scores: report.scores,
          qaRecords: currentQA,
          report: report,
          meta: currentMeta
        });
        // 上限20条
        if (history.length > 20) history.length = 20;
        localStorage.setItem('interviewHistory', JSON.stringify(history));
        showToast('已保存到本地', 'success');
      } catch (e) {
        console.error('[报告页] 本地保存失败:', e);
      }
    }

    // ==================== 工具函数 ====================

    /**
     * 显示错误视图
     */
    function showError(msg, showRetry) {
      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('report-view').classList.add('hidden');
      document.getElementById('error-view').classList.remove('hidden');
      document.getElementById('error-msg').textContent = msg;

      if (showRetry) {
        const btn = document.createElement('button');
        btn.textContent = '重新生成报告';
        btn.className = 'btn-brand ml-4 px-6 py-3 rounded-xl text-white font-medium';
        btn.addEventListener('click', () => {
          document.getElementById('error-view').classList.add('hidden');
          document.getElementById('loading-view').classList.remove('hidden');
          // 清除缓存以强制重新生成
          localStorage.removeItem('currentInterviewReport');
          generateReport();
        });
        document.getElementById('error-view').querySelector('p').after(btn);
      }
    }

    /**
     * 显示加载视图
     */
    function showLoading(text) {
      document.getElementById('error-view').classList.add('hidden');
      document.getElementById('report-view').classList.add('hidden');
      document.getElementById('loading-view').classList.remove('hidden');
      document.getElementById('loading-text').textContent = text || 'AI 正在分析你的面试表现...';
    }

    /**
     * Toast 消息（右下角，3秒消失）
     */
    function showToast(message, type) {
      type = type || 'info';
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');

      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-amber-500',
        info: 'bg-gray-600'
      };

      toast.className = `${colors[type] || colors.info} text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium toast-enter flex items-center gap-2 min-w-[200px]`;

      const icons = {
        success: '&#9989;',
        error: '&#10060;',
        warning: '&#9888;&#65039;',
        info: '&#8505;&#65039;'
      };

      toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${escHtml(message)}</span>`;
      container.appendChild(toast);

      // 3秒后消失
      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    /**
     * HTML转义
     */
    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /**
     * 截断文本
     */
    function truncate(str, maxLen) {
      if (!str) return '';
      if (str.length <= maxLen) return str;
      return str.substring(0, maxLen) + '...';
    }

    /**
     * 动态加载外部脚本（Promise）
     */
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) {
          resolve();
          return;
        }
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('脚本加载失败: ' + src));
        document.head.appendChild(s);
      });
    }
  </script>
